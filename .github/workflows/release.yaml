name: release

on: # yamllint disable-line rule:truthy
  release:
    types:
      - published
  schedule:
    # Rebuild latest stable release weekly on Mondays at 03:00 UTC
    - cron: "0 3 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run build without pushing to registries"
        required: false
        type: boolean
        default: false

# Only one run per ref at a time; cancel any in-progress run for the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    permissions:
      contents: read
      packages: write
      actions: write
      security-events: write
      id-token: write      # Required for Cosign keyless signing
      attestations: write  # Required for GitHub build provenance
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      # False only when the workflow_dispatch dry_run input is explicitly 'true'.
      # On release and schedule events this is always 'true' (push enabled).
      DO_PUSH: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve latest release tag (scheduled runs only)
        id: get_tag
        if: github.event_name == 'schedule'
        run: |
          git fetch --tags --force
          LATEST_TAG=$(git tag -l --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)
          if [ -z "$LATEST_TAG" ]; then
            echo "No release tags found — nothing to rebuild."
            exit 0
          fi
          echo "Rebuilding release tag: $LATEST_TAG"
          git checkout "$LATEST_TAG"
          echo "tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/hosting-tools
            docker.io/cdrocker/hosting-tools
          tags: |
            # 'pattern={{version}}' strips the leading 'v' automatically.
            type=semver,pattern={{version}},value=${{ steps.get_tag.outputs.tag || github.ref_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.get_tag.outputs.tag || github.ref_name }}
            type=semver,pattern={{major}},value=${{ steps.get_tag.outputs.tag || github.ref_name }}
          labels: |
            maintainer=${{ github.actor }}
            org.opencontainers.image.title=hosting-tools
            org.opencontainers.image.description=A collection of self-hosting and operational tools
            org.opencontainers.image.url=https://codar.nl
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Cosign
        if: env.DO_PUSH == 'true'
        uses: sigstore/cosign-installer@v3

      - name: Log in to GHCR
        if: env.DO_PUSH == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: env.DO_PUSH == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ env.DO_PUSH }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: mode=max

      - name: Sign image digest with Cosign
        # Sign the digest rather than each individual tag — tags are mutable,
        # the digest is the canonical, immutable reference.
        if: env.DO_PUSH == 'true'
        env:
          DIGEST: ${{ steps.docker_build.outputs.digest }}
        run: |
          cosign sign --yes \
            "ghcr.io/${{ github.repository_owner }}/hosting-tools@${DIGEST}" \
            "docker.io/cdrocker/hosting-tools@${DIGEST}"

      - name: Generate artifact attestation
        if: env.DO_PUSH == 'true'
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/hosting-tools
          subject-digest: ${{ steps.docker_build.outputs.digest }}
          push-to-registry: true

      - name: Scan image with Grype
        id: grype_scan
        uses: anchore/scan-action@v6
        with:
          image: ${{ fromJson(steps.meta.outputs.json).tags[0] }}
          fail-build: false
          severity-cutoff: critical

      - name: Upload Grype SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.grype_scan.outputs.sarif }}
          category: grype-scan

      - name: Generate build summary
        if: always()
        run: |
          {
            echo "## Build Summary"
            echo "| Property | Value |"
            echo "| --- | --- |"
            echo "| **Event** | ${{ github.event_name }} |"
            echo "| **Pushed** | ${{ env.DO_PUSH }} |"
            echo "| **Digest** | \`${{ steps.docker_build.outputs.digest }}\` |"
            echo ""
            echo "### Tags"
            echo "\`\`\`"
            echo "${{ steps.meta.outputs.tags }}"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
